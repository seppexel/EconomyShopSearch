name: Build Minecraft Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: '8.8'

    # Fixed: Added mandatory User-Agent header and a bulletproof backup download link
    - name: Fetch EconomyShopGUI Core Plugin Dependency
      run: |
        mkdir -p libs
        
        echo "Querying Modrinth API with required User-Agent..."
        JAR_URL=$(curl -s -H "User-Agent: GitHubActions/EconomyShopSearchBuild" "https://api.modrinth.com/v2/project/economyshopgui/version" | jq -r '.[0].files[0].url')
        
        if [ -z "$JAR_URL" ] || [ "$JAR_URL" == "null" ]; then
          echo "Modrinth API gave an empty response. Deploying fallback direct URL..."
          JAR_URL="https://cdn.modrinth.com/data/v1Z4bYt6/versions/pbR8XnNq/EconomyShopGUI-6.1.1.jar"
        fi
        
        echo "Downloading core dependency from: $JAR_URL"
        curl -L -H "User-Agent: GitHubActions/EconomyShopSearchBuild" -o libs/EconomyShopGUI.jar "$JAR_URL"

    # Verifies the file downloaded successfully before starting the compiler
    - name: Verify Dependency Presence
      run: ls -la libs/

    - name: Build Plugin
      run: gradle build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: EconomyShopSearch-Jar
        path: build/libs/*.jar
