name: Build Minecraft Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: '8.8'

    # This steps grabs the real plugin jar from Modrinth and saves it locally
    - name: Fetch EconomyShopGUI Core Plugin Depend
      run: |
        mkdir -p libs
        JAR_URL=$(curl -s "https://api.modrinth.com/v2/project/economyshopgui/version" | jq -r '.[0].files[0].url')
        echo "Downloading core dependency from: $JAR_URL"
        curl -L -o libs/EconomyShopGUI.jar "$JAR_URL"

    - name: Build Plugin
      run: gradle build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: EconomyShopSearch-Jar
        path: build/libs/*.jar
