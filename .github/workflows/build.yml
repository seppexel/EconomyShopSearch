name: Build Minecraft Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Plugin Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: '8.8'

    # Step to download and clone the API repository directly
    - name: Clone EconomyShopGUI API Source
      run: git clone https://github.com/Gypopo/EconomyShopGUI-API.git extra-api

    # Compile the API source code and dynamically find/rename the output jar
    - name: Build EconomyShopGUI API Jar
      run: |
        cd extra-api
        mvn clean package -DskipTests
        cd ..
        mkdir -p libs
        find extra-api/target/ -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" -exec cp {} libs/EconomyShopGUI-API.jar \;

    # Run the main plugin builder utilizing our explicitly located API file
    - name: Build Plugin
      run: gradle build

    - name: Upload Finished Jar
      uses: actions/upload-artifact@v4
      with:
        name: EconomyShopSearch-Jar
        path: build/libs/*.jar
